<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELCHIP — Semiconductor Manufacturing & Inspection System</title>
  <meta name="description" content="Interactive educational platform for semiconductor IC fabrication processes — from silicon wafer preparation to final package testing. Explore 13 manufacturing steps, inspection tools, and industry companies.">
  <meta name="keywords" content="semiconductor manufacturing, photolithography, etching, ion implantation, CMP, wafer inspection, ASML, KLA, TSMC, IC fabrication">
  <meta name="author" content="Akshith Mandapally">

  <!-- Open Graph -->
  <meta property="og:title" content="ELCHIP — Semiconductor Manufacturing & Inspection System">
  <meta property="og:description" content="Interactive educational platform for IC fabrication processes.">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="tnc-removebg-preview.png?v=3">

  <!-- Content Security Policy
       - script-src: self + unpkg.com (AOS)
       - connect-src: Wikipedia API, DuckDuckGo API, and Invidious API
       - frame-src: YouTube for embedded video players
       - img-src: Wikipedia and YouTube thumbnails
       - style-src: unsafe-inline required for AOS CDN styles -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' https://unpkg.com;
             style-src 'self' 'unsafe-inline';
             font-src 'self';
             img-src 'self' data: https://upload.wikimedia.org https://en.wikipedia.org https://img.youtube.com;
             connect-src 'self' https://en.wikipedia.org https://api.duckduckgo.com https://yewtu.be;
             frame-src https://www.youtube.com https://www.youtube-nocookie.com;
             object-src 'none';
             frame-ancestors 'none';">

  <!-- Clickjacking protection -->
  <meta http-equiv="X-Frame-Options" content="DENY">
  <!-- Prevent MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Tahoma is a system font — no external font CDN required -->

  <!-- AOS — Animate on Scroll (CDN with SRI hash)
       TODO(security): Verify SRI hash matches current version before production deployment.
       NOTE: Update AOS version here if upgrading the library. -->
  <!-- TODO(security): Add verified SRI hash before production deployment.
       Generate with: openssl dgst -sha384 -binary aos.css | openssl base64 -A -->
  <link rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"
    crossorigin="anonymous">

  <!-- Global styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ─── LOADING SCREEN ──────────────────────────────────────────────── -->
  <div class="loading-screen" id="loading-screen" aria-live="polite" aria-label="Loading platform">
    <div class="loading-logo">ELCHIP</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Initializing Semiconductor Platform</div>
  </div>

  <!-- ─── NAV SHELL ───────────────────────────────────────────────────── -->
  <!-- Nav is built dynamically by app.js using secure DOM construction -->
  <div class="nav-shell" id="nav-shell" role="banner"></div>

  <!-- ─── APP CONTAINER ───────────────────────────────────────────────── -->
  <!-- All page content is rendered here by the hash router in app.js -->
  <div id="app" role="main" aria-live="polite"></div>

  <!-- ─── SCRIPTS (deferred, loaded in dependency order) ──────────────── -->
  <!-- 
    Load order:
    1. Data layer (semiconductor.js) — pure static data, no user input
    2. Component utilities (wafer-canvas.js, glossary) 
    3. Page renderers (home, process, tool, companies)
    4. Main app router (app.js) — initializes last after all modules loaded
    
    Security: All scripts are same-origin (self). 
    AOS CDN allowed in CSP above with SRI integrity check.
    No dynamic script loading or eval() used anywhere.
  -->

  <!-- Static educational data from PDF -->
  <script src="data/semiconductor.js"></script>

  <!-- Component utilities -->
  <script src="components/wafer-canvas.js"></script>

  <!-- Page renderers -->
  <script src="pages/home.js"></script>
  <script src="pages/process.js"></script>
  <script src="pages/tool.js"></script>
  <script src="pages/companies.js"></script>

  <!-- Router — must load last -->
  <script src="app.js"></script>

  <!-- AOS (Animate on Scroll) — CDN with integrity check
       TODO(security): Update SRI hash when upgrading AOS version. -->
  <!-- TODO(security): Add verified SRI hash before production deployment.
       Generate with: openssl dgst -sha384 -binary aos.js | openssl base64 -A -->
  <script
    src="https://unpkg.com/aos@2.3.1/dist/aos.js"
    crossorigin="anonymous"
    defer></script>

  <script>
    // Initialize AOS after DOM is ready
    // Security: No user data passed to AOS configuration
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof AOS !== 'undefined') {
        AOS.init({
          duration: 650,
          once: true,
          offset: 60,
          easing: 'ease-out-cubic',
        });
      }
    });
  </script>

</body>

</html>
